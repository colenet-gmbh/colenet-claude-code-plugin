name: validate

on:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Runs every hook from .pre-commit-config.yaml against all files —
      # the same checks developers get locally. Fails (red) on any problem.
      - uses: pre-commit/action@v3.0.1
