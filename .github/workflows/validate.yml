name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Same hooks developers run locally. Fails (red) on any problem.
      - uses: pre-commit/action@v3.0.1
      # Require the plugin version to be bumped only on the RELEASE pull request
      # — the one targeting `main`. Day-to-day PRs land on `develop` and must NOT
      # each bump the version; the single bump happens when `develop` -> `main`
      # ships a release. BASE_REF is passed via env (not interpolated into the
      # script) to avoid workflow injection.
      - name: Require version bump (release PR into main only)
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          CAPE_BASE_REF="origin/$BASE_REF" bash scripts/validate-plugin.sh
